name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          AE4E23: ${{ secrets.AE4E23 }}
          B2A4DB: ${{ secrets.B2A4DB }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('AE4E23', '')
          bm = os.environ.get('B2A4DB', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s
              if gm:
                  s2 = s2.replace('<!-- 4f0fecd7ae131cf42d2fa29d0284483d1155fbd777 -->', gm)
              if bm:
                  s2 = s2.replace('<!-- c08b6657e6f9e197d8bbaea80c9ad18e3f31f460 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0 and (gm or bm):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
